name: Migrate database

# Applies committed Prisma migrations to the production database on merge to
# main, before/alongside Vercel's deploy. Requires repo secrets DATABASE_URL
# and DIRECT_URL (your Neon connection strings) — see web/DEPLOY.md.

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Skip gracefully if the DB secret hasn't been configured yet.
    if: ${{ true }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
